{% extends "base_layout.html" %}

{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    
    <h1 style="font-size: 72px; margin: 0; color: #e74c3c;">404</h1>
    <h2 style="color: #2c3e50;">Página no encontrada</h2>
    <p style="color: #666; font-size: 16px; max-width: 400px; margin: 0 auto 30px;">
        {{ mensaje or "El contenido que buscás no existe o fue eliminado." }}
    </p>

    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
        <a href="{{ url_for('home') }}" 
           style="background: #3498db; color: white; padding: 10px 24px; 
                  border-radius: 6px; text-decoration: none;">
            Ir al inicio
        </a>
        <a href="javascript:history.back()" 
           style="background: #95a5a6; color: white; padding: 10px 24px; 
                  border-radius: 6px; text-decoration: none;">
            Volver atrás
        </a>
    </div>

</div>
{% endblock %}
